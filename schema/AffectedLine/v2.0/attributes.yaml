openapi: 3.1.0
info:
  title: AffectedLine
  version: 2.0.0
  description: Schema definition for the AffectedLine entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    AffectedLine:
      type: object
      title: AffectedLine
      description: A reference to a transport line that is affected by a service disruption
        or alert.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        lineId:
          description: Identifier of the affected transport line
          type: string
        lineRef:
          description: Reference to the affected Line entity
          $ref: https://schema.beckn.io/Line/v2.0/attributes.yaml#/components/schemas/Line
        affectedStops:
          description: Stops on this line affected by the disruption
          $ref: https://schema.beckn.io/Stop/v2.0/attributes.yaml#/components/schemas/Stop
        cause:
          description: Cause of the disruption affecting this line
          type: string
        id:
          description: Unique identifier for the alert
          type: string
        descriptor:
          description: Human-readable description of the alert
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        validity:
          description: Time period during which the alert is active
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        status:
          description: Current status of the alert
          $ref: https://schema.beckn.io/State/v2.0/attributes.yaml#/components/schemas/State
      additionalProperties: false
