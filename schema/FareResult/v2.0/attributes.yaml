openapi: 3.1.0
info:
  title: FareResult
  version: 2.0.0
  description: Schema definition for the FareResult entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    FareResult:
      type: object
      title: FareResult
      description: The calculated fare for a requested trip, returned as part of a
        trip planning or fare enquiry response.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        totalAmount:
          description: Total calculated fare amount
          type: number
        currency:
          description: ISO 4217 currency code
          type: string
        fareProducts:
          description: Fare products applicable to the result
          $ref: https://schema.beckn.io/FareProduct/v2.0/attributes.yaml#/components/schemas/FareProduct
        fareBreakup:
          description: Itemised breakdown of the calculated fare
          $ref: https://schema.beckn.io/FareBreakup/v2.0/attributes.yaml#/components/schemas/FareBreakup
        id:
          description: Unique identifier for the offer
          type: string
        descriptor:
          description: Human-readable description of the offer
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        price:
          description: Price specification for this offer
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        validity:
          description: Validity period of the offer
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        tags:
          description: Tags or labels associated with the offer
          type: string
      additionalProperties: false
