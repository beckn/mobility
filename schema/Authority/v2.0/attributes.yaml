openapi: 3.1.0
info:
  title: Authority
  version: 2.0.0
  description: Schema definition for the Authority entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Authority:
      type: object
      title: Authority
      description: A governmental or administrative body responsible for planning,
        regulating, and overseeing transport services within a jurisdiction.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        authorityId:
          description: Unique identifier for the authority
          type: string
        jurisdiction:
          description: Geographic or administrative jurisdiction of this authority
          type: string
        regulatoryScope:
          description: Scope of regulatory powers (e.g. national, regional, local)
          type: string
        id:
          description: Unique identifier for the provider
          type: string
        descriptor:
          description: Human-readable description of the provider
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        categories:
          description: Service categories offered by the provider
          $ref: https://schema.beckn.io/CategoryCode/v2.1/attributes.yaml#/components/schemas/CategoryCode
        locations:
          description: Locations where the provider offers services
          $ref: https://schema.beckn.io/Location/v2.0/attributes.yaml#/components/schemas/Location
        items:
          description: Items available for discovery from this provider
          $ref: https://schema.beckn.io/Item/v2.1/attributes.yaml#/components/schemas/Item
        fulfillments:
          description: Fulfillment options offered by this provider
          $ref: https://schema.beckn.io/Fulfillment/v2.1/attributes.yaml#/components/schemas/Fulfillment
        ratingsTotal:
          description: Total number of ratings received
          type: number
        rating:
          description: Aggregate rating of the provider
          $ref: https://schema.beckn.io/Rating/v2.0/attributes.yaml#/components/schemas/Rating
      additionalProperties: false
