openapi: 3.1.0
info:
  title: WaitingPolicy
  version: 2.0.0
  description: Schema definition for the WaitingPolicy entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    WaitingPolicy:
      type: object
      title: WaitingPolicy
      description: Rules governing the maximum time a driver is required to wait for
        a passenger at the pickup location before being permitted to cancel the booking.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        freeWaitingTimeMinutes:
          description: Number of minutes the driver waits for free before charging
          type: number
        maxWaitingTimeMinutes:
          description: Maximum total minutes the driver will wait before auto-cancelling
          type: number
        chargePerExtraMinute:
          description: Additional charge per minute beyond the free waiting time
          type: number
        currency:
          description: ISO 4217 currency code for waiting charges
          type: string
        id:
          description: Unique identifier for the policy
          type: string
        policyType:
          description: Type of policy (extensible term)
          type: string
        descriptor:
          description: Human-readable description of the policy
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        validity:
          description: Validity window for this policy version
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        policyAttributes:
          description: Extensible domain-specific policy attributes
          $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
      additionalProperties: false
