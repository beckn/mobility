openapi: 3.1.0
info:
  title: Level
  version: 2.0.0
  description: Schema definition for the Level entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Level:
      type: object
      title: Level
      description: A floor or vertical level within a multi-level transit station
        or facility, used to define internal navigation paths.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        levelId:
          description: Unique identifier for this level within the station
          type: string
        levelName:
          description: Human-readable name of the level (e.g. Ground Floor, Level
            1)
          type: string
        elevation:
          description: Elevation of this level in metres above ground
          type: number
        stationRef:
          description: Reference to the station this level belongs to
          $ref: https://schema.beckn.io/Station/v2.0/attributes.yaml#/components/schemas/Station
        id:
          description: Unique identifier for the location
          type: string
        descriptor:
          description: Human-readable description of the location
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        gps:
          description: GPS coordinates as a latitude,longitude string
          type: string
        address:
          description: Physical address of the location
          $ref: https://schema.beckn.io/Address/v2.0/attributes.yaml#/components/schemas/Address
        city:
          description: City name
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
        geojson:
          description: GeoJSON geometry object representing this location
          $ref: https://schema.beckn.io/GeoJSONGeometry/v2.0/attributes.yaml#/components/schemas/GeoJSONGeometry
      additionalProperties: false
