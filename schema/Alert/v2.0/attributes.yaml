openapi: 3.1.0
info:
  title: Alert
  version: 2.0.0
  description: Schema definition for the Alert entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Alert:
      type: object
      title: Alert
      description: A notification of a service disruption, delay, or advisory affecting
        one or more routes, stops, or vehicle journeys.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        cause:
          description: Cause of the alert (e.g. TECHNICAL_PROBLEM, STRIKE, ACCIDENT)
          type: string
        effect:
          description: Effect on service (e.g. DETOUR, REDUCED_SERVICE, NO_SERVICE)
          type: string
        url:
          description: URL to a page with more information about the alert
          type: string
          format: uri
        headerText:
          description: Short header text for the alert
          type: string
        descriptionText:
          description: Detailed description of the alert
          type: string
        activePeriod:
          description: Time period during which the alert is active
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        informedEntity:
          description: Transport entities affected by this alert
          $ref: https://schema.beckn.io/EntitySelector/v2.0/attributes.yaml#/components/schemas/EntitySelector
        id:
          description: Unique identifier for the alert
          type: string
        descriptor:
          description: Human-readable description of the alert
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        validity:
          description: Time period during which the alert is active
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        status:
          description: Current status of the alert
          $ref: https://schema.beckn.io/State/v2.0/attributes.yaml#/components/schemas/State
      additionalProperties: false
