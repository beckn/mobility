openapi: 3.1.0
info:
  title: VehicleCategory
  version: 2.0.0
  description: Schema definition for the VehicleCategory entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    VehicleCategory:
      type: object
      title: VehicleCategory
      description: A broad classification of vehicles by their physical type, such
        as two-wheeler, three-wheeler, four-wheeler, or bus.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        vehicleCategoryCode:
          description: Code for the vehicle category (e.g. TWO_WHEELER, THREE_WHEELER,
            FOUR_WHEELER, BUS)
          type: string
        maxPassengers:
          description: Maximum number of passengers for vehicles in this category
          type: number
        id:
          description: Unique identifier for the category code
          type: string
        descriptor:
          description: Human-readable label for the category
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        parentCategoryId:
          description: Identifier of the parent category if hierarchical
          type: string
      additionalProperties: false
