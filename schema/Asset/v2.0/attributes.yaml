openapi: 3.1.0
info:
  title: Asset
  version: 2.0.0
  description: Schema definition for the Asset entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Asset:
      type: object
      title: Asset
      description: A specific mobility resource (vehicle, bike, scooter, or car) managed
        and made available for use by a mobility provider.
      x-tags:
        - redundant
      properties:
        assetId:
          description: Provider-assigned unique identifier for the asset
          type: string
        assetType:
          description: Vehicle type classification of this asset
          $ref: https://schema.beckn.io/VehicleType/v2.0/attributes.yaml#/components/schemas/VehicleType
        currentStatus:
          description: Real-time operational status of this asset
          $ref: https://schema.beckn.io/VehicleStatus/v2.0/attributes.yaml#/components/schemas/VehicleStatus
        currentLocation:
          description: Current geographic location of the asset
          $ref: https://schema.beckn.io/Location/v2.0/attributes.yaml#/components/schemas/Location
        id:
          description: Unique identifier for the item
          type: string
        descriptor:
          description: Human-readable description of the item
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        categoryId:
          description: Category code classifying the item
          $ref: https://schema.beckn.io/CategoryCode/v2.1/attributes.yaml#/components/schemas/CategoryCode
        price:
          description: Price specification for this item
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        quantity:
          description: Available quantity of the item
          $ref: https://schema.beckn.io/Quantity/v2.0/attributes.yaml#/components/schemas/Quantity
        tags:
          description: Tags associated with the item
          type: string
      additionalProperties: false
