openapi: 3.1.0
info:
  title: Rating
  version: 2.0.0
  description: Schema definition for the Rating entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Rating:
      type: object
      title: Rating
      description: A numerical or categorical score assigned by a user to a driver,
        vehicle, or mobility service experience.
      x-tags:
        - redundant
      properties:
        ratedEntityId:
          description: Identifier of the entity being rated (driver, vehicle, service)
          type: string
        ratedEntityType:
          description: Type of entity being rated (DRIVER, VEHICLE, SERVICE)
          type: string
        comment:
          description: Optional text comment accompanying the rating
          type: string
        target:
          description: The entity being rated, with id and category (Order, Fulfillment,
            Provider, Agent)
          type: string
        range:
          description: Rating scale definition (numeric range or descriptor array)
          type: string
        ratingValue:
          description: Numeric rating value selected by the user
          type: number
        feedback:
          description: Textual feedback or written review accompanying the rating
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
      additionalProperties: false
