openapi: 3.1.0
info:
  title: Station
  version: 2.0.0
  description: Schema definition for the Station entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Station:
      type: object
      title: Station
      description: A major transit facility serving as a hub for one or more transport
        modes, typically offering waiting areas, ticketing, and interchange facilities.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        stationId:
          description: Unique identifier for the station
          type: string
        stationName:
          description: Human-readable name of the station
          type: string
        stationType:
          description: Primary transport mode served (e.g. RAIL, BUS, METRO, FERRY)
          type: string
        platforms:
          description: Platforms or quays within this station
          $ref: https://schema.beckn.io/Quay/v2.0/attributes.yaml#/components/schemas/Quay
        levels:
          description: Levels or floors within the station
          $ref: https://schema.beckn.io/Level/v2.0/attributes.yaml#/components/schemas/Level
        pathways:
          description: Internal navigation pathways within the station
          $ref: https://schema.beckn.io/Pathway/v2.0/attributes.yaml#/components/schemas/Pathway
        id:
          description: Unique identifier for the location
          type: string
        descriptor:
          description: Human-readable description of the location
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        gps:
          description: GPS coordinates as a latitude,longitude string
          type: string
        address:
          description: Physical address of the location
          $ref: https://schema.beckn.io/Address/v2.0/attributes.yaml#/components/schemas/Address
        city:
          description: City name
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
        geojson:
          description: GeoJSON geometry object representing this location
          $ref: https://schema.beckn.io/GeoJSONGeometry/v2.0/attributes.yaml#/components/schemas/GeoJSONGeometry
      additionalProperties: false
