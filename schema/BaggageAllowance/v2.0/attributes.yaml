openapi: 3.1.0
info:
  title: BaggageAllowance
  version: 2.0.0
  description: Schema definition for the BaggageAllowance entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    BaggageAllowance:
      type: object
      title: BaggageAllowance
      description: The quantity and weight of baggage a passenger is permitted to
        carry or check in without incurring additional charges.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        cabinBaggageCount:
          description: Maximum number of cabin (carry-on) bags allowed
          type: number
        cabinBaggageWeight:
          description: Maximum weight in kilograms for cabin baggage
          type: number
        checkedBaggageCount:
          description: Maximum number of checked bags allowed
          type: number
        checkedBaggageWeight:
          description: Maximum weight in kilograms per checked bag
          type: number
        id:
          description: Unique identifier for the constraint
          type: string
        constraintType:
          description: Type of constraint (extensible term)
          type: string
        operator:
          description: Comparator operator (e.g. <=, >=, =)
          type: string
        value:
          description: Numeric value of the constraint
          type: number
        unitCode:
          description: Unit of measure code (UN/ECE Rec 20)
          type: string
        validity:
          description: Validity window for this constraint
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
      additionalProperties: false
