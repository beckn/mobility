openapi: 3.1.0
info:
  title: TariffZone
  version: 2.0.0
  description: Schema definition for the TariffZone entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    TariffZone:
      type: object
      title: TariffZone
      description: A geographic zone used to define and apply fare structures, within
        which a single fare or set of rules applies.
      x-tags:
        - mobility
        - geosparql
        - schema-org
        - ride-hailing
      properties:
        zoneId:
          description: Unique identifier for the tariff zone
          type: string
        zoneName:
          description: Human-readable name of the tariff zone
          type: string
        geometry:
          description: GeoJSON geometry defining the zone boundary
          $ref: https://schema.beckn.io/GeoJSONGeometry/v2.0/attributes.yaml#/components/schemas/GeoJSONGeometry
        id:
          description: Unique identifier for the location
          type: string
        descriptor:
          description: Human-readable description of the location
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        gps:
          description: GPS coordinates as a latitude,longitude string
          type: string
        address:
          description: Physical address of the location
          $ref: https://schema.beckn.io/Address/v2.0/attributes.yaml#/components/schemas/Address
        city:
          description: City name
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
        geojson:
          description: GeoJSON geometry object representing this location
          $ref: https://schema.beckn.io/GeoJSONGeometry/v2.0/attributes.yaml#/components/schemas/GeoJSONGeometry
      additionalProperties: false
