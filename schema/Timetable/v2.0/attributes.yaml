openapi: 3.1.0
info:
  title: Timetable
  version: 2.0.0
  description: Schema definition for the Timetable entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Timetable:
      type: object
      title: Timetable
      description: A structured schedule listing planned arrival and departure times
        for vehicles at each stop along a route.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        routeRef:
          description: Reference to the route this timetable covers
          $ref: https://schema.beckn.io/Route/v2.0/attributes.yaml#/components/schemas/Route
        trips:
          description: Vehicle journeys (trips) in this timetable
          $ref: https://schema.beckn.io/VehicleJourney/v2.0/attributes.yaml#/components/schemas/VehicleJourney
        validFrom:
          description: Date from which this timetable is valid
          type: string
          format: date-time
        validUntil:
          description: Date until which this timetable is valid
          type: string
          format: date-time
        id:
          description: Unique identifier for the catalog
          type: string
        descriptor:
          description: Human-readable description of the catalog
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        tags:
          description: Tags associated with the catalog
          type: string
      additionalProperties: false
