openapi: 3.1.0
info:
  title: Review
  version: 2.0.0
  description: Schema definition for the Review entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Review:
      type: object
      title: Review
      description: A written review or opinion submitted by a passenger about a completed
        mobility service, driver, or vehicle.
      properties:
        reviewText:
          description: The written text of the review
          type: string
        reviewedAt:
          description: Date and time the review was submitted
          type: string
          format: date-time
        reviewer:
          description: The passenger who submitted this review
          $ref: https://schema.beckn.io/Rider/v2.0/attributes.yaml#/components/schemas/Rider
        target:
          description: The entity being rated, with id and category (Order, Fulfillment,
            Provider, Agent)
          type: string
        range:
          description: Rating scale definition (numeric range or descriptor array)
          type: string
        ratingValue:
          description: Numeric rating value selected by the user
          type: number
        feedback:
          description: Textual feedback or written review accompanying the rating
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
      additionalProperties: false
