openapi: 3.1.1
info:
  title: Beckn Core Schemas v2
  description: Core schemas for the Beckn Protocol v2. This file contains the fundamental object structures and payload shapes used when executing discovery, ordering, fulfillment, post-fulfillment and other workflows on Beckn
  version: 2.1.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    AcceptedPaymentMethod:
      description: Payment methods accepted by a payee
      type: array
      items:
        type: string
        enum:
        - UPI
        - CREDIT_CARD
        - DEBIT_CARD
        - WALLET
        - BANK_TRANSFER
        - CASH
        - APPLE_PAY
      x-jsonld:
        '@id': beckn:acceptedPaymentMethod
      examples:
        - $ref: '../../examples/v2.1/AcceptedPaymentMethod.examples.yaml#/basic'

    AckResponse:
      type: object
      properties:
        ackStatus:
          type: string
          enum:
          - ACK
          - NACK
        error:
          $ref: '#/components/schemas/Error'
        timestamp:
          type: string
          format: date-time
        transactionId:
          type: string
      required:
      - transactionId
      - timestamp
      - ackStatus
      additionalProperties: false
      allOf:
      - if:
          properties:
            ackStatus:
              const: NACK
          required:
          - ackStatus
        then:
          required:
          - error
      - if:
          properties:
            ackStatus:
              const: ACK
          required:
          - ackStatus
        then:
          not:
            required:
            - error
    Address:
      description: '**Postal address** aligned with schema.org `PostalAddress`. Use for human-readable addresses. Geometry
        lives in `Location.geo` as GeoJSON.'
      type: object
      properties:
        addressCountry:
          description: Country name or ISO-3166-1 alpha-2 code.
          type: string
          example: IN
        addressLocality:
          description: City/locality.
          type: string
          example: Bengaluru
        addressRegion:
          description: State/region/province.
          type: string
          example: Karnataka
        extendedAddress:
          description: Address extension (apt/suite/floor, C/O).
          type: string
          example: Apt 4B
        postalCode:
          description: Postal/ZIP code.
          type: string
          example: '560001'
        streetAddress:
          description: Street address (building name/number and street).
          type: string
          example: 123 Tech Street
      additionalProperties: false

    Alert:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Alert
        affectedEntities:
          description: IDs of entities affected (route/order/fulfillment/etc.)
          type: array
          items:
            type: string
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        id:
          type: string
        severity:
          type: string
        validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      additionalProperties: false

    Attributes:
      description: JSON-LD aware container for domain-specific attributes of an Item. MUST include @context (URI) and @type
        (compact or full IRI). Any additional properties are allowed and interpreted per the provided JSON-LD context.
      type: object
      properties:
        '@context':
          description: Use case specific JSON-LD context URI
          type: string
          format: uri
          example: https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld
        "@type":
          description: JSON-LD type defined within the context
          type: string
          example: ElectronicItem
      required:
      - '@context'
      - "@type"
      additionalProperties: true

    Consumer:
      allOf:
        - type: object
          additionalProperties: false
          properties:
            "@context":
              type: string
              format: uri
              const: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld"
            "@type":
              type: string
              const: "beckn:Consumer" 
              x-jsonld:
                "@id": "schema:Thing"
            role:
              description: The functional role of the consumer in the transaction.
              type: string
              x-jsonld:
                '@id': schema:roleName
            consumerAttributes:
              description: 'Attribute Pack reference for richer identity: # consumer/identity.v1 (contact details: email, phone,
                address) # consumer/org-ids.v1 (LEI, GSTIN, ISIN, CUSIP…) # consumer/kyc.v1 (jurisdictional compliance fields) # consumer/preferences.v1
                (delivery preferences, accessibility needs, etc.)'
              allOf:
                - $ref: '#/components/schemas/Attributes'
          required: ["@context", "@type"]

        - oneOf:
            - type: object
              properties:
                person:
                  $ref: "#/components/schemas/Person"
              required: ["person"]

            - type: object
              properties:
                organization:
                  $ref: "#/components/schemas/Organization"
              required: ["organization"]

    CancellationOutcome:
      type: object
      properties:
        descriptor:
          allOf:
            - $ref: '#/components/schemas/Descriptor'
          properties:
            "@type":
              default: 'beckn:CancellationOutcome'
          

    CancellationPolicy:
      type: object
      properties:
        "@context":
          description: "CPD"
          type: string
          format: uri
          const: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld"
        "@type":
          type: string
          const: "beckn:CancellationPolicy" 
          x-jsonld:
            "@id": "schema:CreativeWork"

    CancellationReason:
      type: object
      properties:
        descriptor:
          allOf:
            - $ref: '#/components/schemas/Descriptor'
          properties:
            "@type":
              default: 'beckn:CancellationReason'

    Catalog:
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core Catalog schema
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          description: Type of the catalog
          type: string
          const: beckn:Catalog
        bppId:
          description: BPP (Beckn Protocol Provider) identifier that publishes this catalog
          type: string
          example: bpp.example.com
        bppUri:
          description: BPP (Beckn Protocol Provider) URI endpoint
          type: string
          format: uri
          example: https://bpp.example.com
        descriptor:
          description: A verbal summary of the catalog for humans, AI agents, etc to read and understand the context.
          allOf:
            - $ref: '#/components/schemas/Descriptor'
        id:
          description: Unique identifier for the catalog
          type: string
          example: catalog-electronics-001
        isActive:
          description: Whether the catalog is active
          type: boolean
          default: true
        items:
          description: Array of beckn core Item entities in this catalog, returned directly without ItemResult wrapper for
            improved performance and simplified response structure
          type: array
          items:
            $ref: '#/components/schemas/Item'
        offers:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        providerId:
          description: Reference to the provider that owns this catalog
          type: string
          example: tech-store-001
        validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      - bppId
      - bppUri
      - items
      additionalProperties: false

    CategoryCode:
      type: object
      properties:
        "@context":
          description: "CPD"
          type: string
          format: uri
          default: schema:CategoryCode
        "@type":
          description: Context-specific Type of the category code
          type: string
          default: schema:CategoryCode
        schema:codeValue:
          description: Category code value
          type: string
          example: electronics
        schema:description:
          description: Category description
          type: string
          example: Electronic devices and equipment
        schema:name:
          description: Category name
          type: string
          example: Electronics
      required:
      - "@type"
      - schema:codeValue
    Constraint:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Constraint
        constraintType:
          description: Type of constraint (extensible term)
          type: string
        id:
          description: Identifier for the constraint
          type: string
        operator:
          description: Comparator/operator (<=, >=, =, etc.)
          type: string
        unitCode:
          description: Unit code (e.g., km, min)
          type: string
        validity:
          $ref: '#/components/schemas/TimePeriod'
        value:
          description: Constraint value
          type: number
      required:
      - '@context'
      - "@type"
      - id
      additionalProperties: false
    Context:
      description: Every API call in beckn protocol has a context. It provides a high-level overview to the receiver about
        the nature of the intended transaction. Typically, it is the BAP that sets the transaction context based on the consumer's
        location and action on their UI. But sometimes, during unsolicited callbacks, the BPP also sets the transaction context
        but it is usually the same as the context of a previous full-cycle, request-callback interaction between the BAP and
        the BPP. The context object contains four types of fields. <ol><li>Demographic information about the transaction using
        fields like `domain`, `country`, and `region`.</li><li>Addressing details like the sending and receiving platform's
        ID and API URL.</li><li>Interoperability information like the protocol version that implemented by the sender and,</li><li>Transaction
        details like the method being called at the receiver's endpoint, the transaction_id that represents an end-to-end
        user session at the BAP, a message ID to pair requests with callbacks, a timestamp to capture sending times, a ttl
        to specifiy the validity of the request, and a key to encrypt information if necessary.</li></ol> This object must
        be passed in every interaction between a BAP and a BPP. In HTTP/S implementations, it is not necessary to send the
        context during the synchronous response. However, in asynchronous protocols, the context must be sent during all interactions,
      type: object
      properties:
        action:
          description: The Beckn protocol method being called by the sender and executed at the receiver.
          type: string
        bapId:
          description: A globally unique identifier of the BAP, Typically it is the fully qualified domain name (FQDN) of
            the BAP
          type: string
        bapUri:
          description: API URL of the BAP for accepting callbacks from BPPs.
          type: string
          format: uri
        bppId:
          description: A globally unique identifier of the BAP, Typically it is the fully qualified domain name (FQDN) of
            the BAP
          type: string
        bppUri:
          description: API URL of the BPP for accepting calls from BAPs.
          type: string
          format: uri
        messageId:
          description: This is a unique value which persists during a request / callback cycle. Since beckn protocol APIs
            are asynchronous, BAPs need a common value to match an incoming callback from a BPP to an earlier call. This value
            can also be used to ignore duplicate messages coming from the BPP. It is recommended to generate a fresh message_id
            for every new interaction. When sending unsolicited callbacks, BPPs must generate a new message_id.
          type: string
          format: uuid
        networkId:
          description: A unique identifier representing a group of platforms. By default, it is the url of the network registry
            on the Beckn network
          type: string
        schemas:
          description: Optional JSON-LD context URLs relevant to the items/offers in this transaction
          type: array
          items:
            type: string
            format: uri
        timestamp:
          description: Time of request generation in RFC3339 format
          type: string
          format: date-time
        transactionId:
          description: This is a unique value which persists across all API calls from `search` through `confirm`. This is
            done to indicate an active user session across multiple requests. The BPPs can use this value to push personalized
            recommendations, and dynamic offerings related to an ongoing transaction despite being unaware of the user active
            on the BAP.
          type: string
          format: uuid
        try:
          description: A flag to indicate that this request is intended to 'try' an operation. Typically set to `false` by
            default, but set to `true` when negotiating terms, updating or cancelling an active order. When set to `true`,
            the receiver must respond with the expected consequences as per the terms of service initially agreed between
            the BAP and the BPP during the `init/on_init` cycle. For example, A BAP will set this flag to `true` when requesting
            the BPP to cancel the order. Upon receiving this the BPP could respond with updated cost, cancellation fees, reasons
            for cancellation, a cancellation form, payment links, and any additional notifications or prompts informing the
            BAP about future consequences if continued (like an account ban, or reduced rating). When both participants are
            ready to continue the transaction, this flag MUST be set back to `false`.
          type: boolean
          default: false
        ttl:
          description: The duration in ISO8601 format after timestamp for which this message holds valid
          type: string
        version:
          description: Version of beckn protocol being used by the sender
          type: string
          const: 2.1.0
    Credential:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Credential
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        expiresAt:
          type: string
          format: date-time
        id:
          type: string
        issueDate:
          type: string
          format: date-time
        issuer:
          description: Issuing authority/entity
          type: string
        number:
          description: Credential/license number
          type: string
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      additionalProperties: false

    Descriptor:
      type: object
      properties:
        "@context":
            description: Use case specific JSON-LD context. This can change from use case to use case, even within a domain.
            type: string
            format: uri
            default: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld"
        "@type":
            description: Type of the descriptor. The type can be overriden with a context-specific type
            type: string
            default: beckn:Descriptor
        longDesc:
          description: Detailed description of the item
          type: string
          example: Powerful gaming laptop with NVIDIA RTX graphics, fast SSD storage, and high-refresh display
        shortDesc:
          description: Short description of the item
          type: string
          example: High-performance gaming laptop with RTX graphics
        name:
          description: Name of the entity being described
          type: string
          example: Premium Gaming Laptop Pro
        thumbnailImage:
          description: Name of the entity being described
          type: string
          format: uri
        docs:
          description: Links to downloadable documents
          type: array
          items:
            $ref: '#/components/schemas/Document'
        mediaFile:
          description: Links to multimedia files and images
          type: array
          items:
            $ref: '#/components/schemas/MediaFile'
      required:
      - "@type"

    MediaFile:
      description: A image, audio, or video typically intended for display purposes
      type: object
      properties:
        label:
          description: The display name of the media file
          type: string
        mimeType:
          MIME type if 'data' is provided (application/pdf, image/png).
        uri:
          description: URL to the document
          type: string
          format: uri

    Document:
      description: A document, that can be parsed, printed, download or displayed. This has intentionally been kept separate from MediaFile as they may contain additional attributes like signature, schema etc. 
      type: object
      properties:
        label:
          description: The display name of the media file
          type: string
        mimeType:
          MIME type if 'data' is provided (application/pdf, image/png, application/json).
        standard:
          description: Describes the schema type in case the document follows a standard schema like a verifiableCredential
          type: string
        url:
          description: URL to the document
          type: string
          format: uri
        security:
          type: object
          properties:
            checksum:
              type: string
            checksumAlgorithm:
              type: string
              enum: [SHA256, SHA512, OTHER]
            signature:
              type: string
            signatureAlgorithm:
              type: string
              description: e.g., Ed25519, ES256
            keyId:
              type: string
        required: [label, url, mimeType]
        
    Eligibility:
      type: object
      properties:
        eligibleQuantity:
          type: object
          properties:
            max:
              type: number
            min:
              type: number
        eligibleRegion:
          type: string
      x-jsonld:
        '@id': schema:DefinedRegion|schema:QuantitativeValue

    Entitlement:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Entitlement
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        entitlementType:
          description: Type of entitlement (ticket, voucher, pass, token, etc.)
          type: string
        id:
          type: string
        number:
          description: Human-readable entitlement number
          type: string
        validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      additionalProperties: false

    Error:
      type: object
      properties:
        code:
          description: Error code
          type: string
          example: INVALID_SCHEMA_FIELD
        details:
          description: Additional error details
          type: object
        message:
          description: Human-readable error message
          type: string
          example: Field 'electronic:invalidField' not found in ElectronicItem schema
      required:
      - code
      - message

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'
      required:
      - error

    Feedback:
      description: Feedback collected from a user (consumer, provider, or fulfillment agent)
      type: object

    FulfillmentMode:
      type: object
      description: Describes the mode of fulfillment. This is an extensible container allowing domain-specific fulfillment modes to be expressed via attributes.
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentMode
        id:
          type: string
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        modeAttributes:
          description: Domain-specific fulfillment mode attributes (e.g., delivery, pickup, reservation, digital)
          allOf:
            - $ref: '#/components/schemas/Attributes'
      additionalProperties: false

    Form:
      description: Describes a form
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Form
          x-jsonld:
            '@id': beckn:Form
        data:
          description: The form submission data
          type: object
          additionalProperties:
            type: string
        mimeType:
          description: This field indicates the nature and format of the form received by querying the url. MIME types are defined and standardized in IETF's RFC 6838.
          type: string
        submissionId:
          type: string
          format: uuid
        url:
          description: The URL from where the form can be fetched. The content fetched from the url must be processed as per
            the mimeType specified in this object. Once fetched, the rendering platform can choosed to render the form as-is
            as an embeddable element; or process it further to blend with the theme of the application. In case the interface
            is non-visual, the the render can process the form data and reproduce it as per the standard specified in the
            form.
          type: string
          format: uri
      required:
      - '@context'
      - "@type"

    Fulfillment:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Fulfillment
          x-jsonld:
            '@id': schema:Thing
        agent:
          description: 'The entity that directly performs the fulfillment'
          allOf:
            - $ref: '#/components/schemas/FulfillmentAgent'
        fulfillmentAttributes:
          description: 'Extensible set of domain-specific attributes describing the fulfillment'
          allOf:
            - $ref: '#/components/schemas/Attributes'
        id:
          description: Fulfillment identifier
          type: string
          x-jsonld:
            '@id': schema:identifier
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/Descriptor'
        mode:
          description: 'Extensible set of attributes describing the mode of fulfillment. Varies with Industry Use Case'
          allOf:
            - $ref: '#/components/schemas/FulfillmentMode'
          x-jsonld:
            '@id': beckn:FulfillmentMode  
        participants:
          description: A list of participants who are entitled to receive the fulfillment of the order. By default, it is the consumer who placed the order  
          type: array
          items:
            $ref: '#/components/schemas/Participant'
          minItems: 1
        state:
          description: 'The current state of fulfillment'
          allOf:
            $ref: '#/components/schemas/State'
        stages:
          description: 'The various stages of the fulfillment'
          type: array
          items:
            $ref: '#/components/schemas/FulfillmentStage'
          minItems: 1
        trackingEnabled:
          description: Whether tracking is enabled / possible for this fulfillment
          type: boolean
      required:
      - '@context'
      - "@type"
      - mode
      additionalProperties: false

    FulfillmentAgent:
      description: The entity directly involved in fulfilling the order. It could be a person, an organization, a machine, a software application, or an AI Agent.
      allOf:
        - type: object
          additionalProperties: false
          properties:
            "@context":
              description: CPD
              type: string
              format: uri
              const: "https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld"
            "@type":
              type: string
              const: "beckn:Agent"
              x-jsonld:
                "@id": "schema:Thing"
            agentAttributes:
              description: >
                Attribute Pack reference for richer identity:
                # agent/identity.v1 (contact details: email, phone, address)
                # agent/org-ids.v1 (LEI, GSTIN, ISIN, CUSIP…)
                # consumer/kyc.v1 (jurisdictional compliance fields)
                # (accessibility needs, etc.)
              $ref: "#/components/schemas/Attributes"
          required:
            - "@context"
            - "@type"

        - oneOf:
            - type: object
              additionalProperties: false
              properties:
                person:
                  $ref: "#/components/schemas/Person"
              required: ["person"]

            - type: object
              additionalProperties: false
              properties:
                organization:
                  $ref: "#/components/schemas/Organization"
              required: ["organization"]

    FulfillmentStage:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentStageEndpoint
        id:
          description: A unique identifier for this stage of fulfillment
          type: string
        instructions:
          description: A set of instructions to follow during this stage of fulfillment
          type: array
          items:
            $ref: '#/components/schemas/Instruction'
        preferences:
          description: A extensible set of attributes that describe the fulfillment preferences
          type: array
          items:
            $ref: '#/components/schemas/Attributes'
        start:
          description: An extensible set of attributes that describe the criteria required to start this stage of fulfillment
          type: object
          allOf: 
            $ref: '#/components/schemas/FulfillmentStageEndpoint'
        end:
          description: An extensible set of attributes that describe the criteria required to end this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/FulfillmentStageEndpoint'
        fulfillmentStageAttributes:
          description: An extensible set of attributes that describe this stage of fulfillment
          allOf: 
            $ref: '#/components/schemas/Attributes'
      x-jsonld:
        '@id': beckn:fulfillmentStage
      required:
      - '@context'
      - "@type"
      - id
      - location
      additionalProperties: false
    
    FulfillmentStageEndpoint:
      type: object
      additionalProperties: false
      description: >
        A stage boundary endpoint (entry or exit) within a fulfillment, such as pickup,
        handover, warehouse in/out, border crossing, gate entry/exit, security check, etc.
        May require one or more proofs/permits/tokens/documents.
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentStageEndpoint
        location:
          $ref: '#/components/schemas/Location'
        time:
          $ref: '#/components/schemas/TimePeriod'
        authorization:
          type: array
          description: >
            One or more credentials required and/or issued at this endpoint.
            Includes machine-readable tokens (QR/URL/OTP) and manual documents (IDs, permits).
          items:
            $ref: '#/components/schemas/FulfillmentStageAuthorization'
    
    FulfillmentStageAuthorization:
      type: object
      additionalProperties: false
      description: >
        A credential/document/proof relevant to authorization at a fulfillment stage endpoint.
        This may be a token to be verified (QR/OTP/URL) or a document to be inspected manually.
      required:
        - purpose
        - requirement
        - status
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:FulfillmentStageAuthorization
        mediaFiles:
          description: Media files required to enter or exit this fulfillment stage. The could be images of delivered packages, recorded video proof of installation, etc
          type: array
          items:
            $ref: '#/components/schemas/MediaFile'
        docs:
          description: Documents required to enter or exit this fulfillment stage. The could be entry tickets, boarding passes, waybill, permits, certificates, credentials, etc
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Document'
        authToken:
          type: string
          description: A human readable string that needs to be provided to enter or exit this fulfillment stage. Like an OTP

    GeoJSONGeometry:
      description: "**GeoJSON geometry** per RFC 7946. Coordinates are in **EPSG:4326 (WGS-84)** and MUST follow **[longitude,\
        \ latitude, (altitude?)]** order.\nSupported types: - Point, LineString, Polygon - MultiPoint, MultiLineString, MultiPolygon\
        \ - GeometryCollection (uses `geometries` instead of `coordinates`)\nNotes: - For rectangles, use a Polygon with a\
        \ single linear ring where the first\n  and last positions are identical.\n- Circles are **not native** to GeoJSON.\
        \ For circular searches, use\n  `SpatialConstraint` with `op: s_dwithin` and a Point + `distanceMeters`,\n  or approximate\
        \ the circle as a Polygon.\n- Optional `bbox` is `[west, south, east, north]` in degrees.\n"
      type: object
      properties:
        bbox:
          description: Optional bounding box `[west, south, east, north]` in degrees.
          type: array
          minItems: 4
          maxItems: 4
        coordinates:
          description: 'Coordinates per RFC 7946 for all types **except** GeometryCollection. Order is **[lon, lat, (alt)]**.
            For Polygons, this is an array of linear rings; each ring is an array of positions.'
          type: array
        geometries:
          description: 'Member geometries when `type` is **GeometryCollection**.'
          type: array
          items:
            $ref: '#/components/schemas/GeoJSONGeometry'
        type:
          type: string
          enum:
          - Point
          - LineString
          - Polygon
          - MultiPoint
          - MultiLineString
          - MultiPolygon
          - GeometryCollection
      required:
      - type
      additionalProperties: true
      examples:
        - $ref: '../../examples/v2.1/GeoJSONGeometry.examples.yaml#/point'
        - $ref: '../../examples/v2.1/GeoJSONGeometry.examples.yaml#/polygon_rectangle'
        - $ref: '../../examples/v2.1/GeoJSONGeometry.examples.yaml#/geometry_collection'

    Instruction:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          enum:
          - Instruction
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        id:
          type: string
        validity:
          $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      additionalProperties: false

    Invoice:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          description: "TPD"
          type: string
          enum:
          - Invoice
          x-jsonld:
            '@id': schema:Invoice
        dueDate:
          type: string
          x-jsonld:
            '@id': schema:paymentDueDate
          format: date
          nullable: true
        id:
          description: Stable invoice identifier (system id)
          type: string
          x-jsonld:
            '@id': schema:identifier
        invoiceAttributes:
          description: Attribute Pack for tax regime (e.g., GST/VAT), e-invoice refs, legal boilerplate, etc.
          allOf:
