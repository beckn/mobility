      additionalProperties: false
    Item:
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core Item schema
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          description: Type of the core item
          type: string
          enum:
          - Item
        availabilityWindow:
          description: Time periods when the item is available
          type: array
          items:
            $ref: '#/components/schemas/TimePeriod'
        availableAt:
          description: Physical locations where the item is available
          type: array
          items:
            $ref: '#/components/schemas/Location'
        category:
          $ref: '#/components/schemas/CategoryCode'
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/Constraint'
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        id:
          description: Unique identifier for the item
          type: string
          example: gaming-laptop-001
        isActive:
          description: Whether the item is active
          type: boolean
          default: true
        itemAttributes:
          $ref: '#/components/schemas/Attributes'
        networkId:
          description: Array of network identifiers for the BAP (Beckn App Provider) that offers this item
          type: array
          items:
            type: string
          example:
          - bap.net/electronics
          - bap.net/tech
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        provider:
          $ref: '#/components/schemas/Provider'
        rateable:
          description: Whether the item can be rated by customers
          type: boolean
          example: true
        rating:
          $ref: '#/components/schemas/Rating'
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      - provider
      - itemAttributes
      additionalProperties: false

    DiscoveryIntent:
      description: A declaration of an intent to discover catalogs.
      type: object
      properties:
        textSearch:
          description: Free text search query for items
          type: string
          example: gaming laptop premium tech
        filters:
          description: Filter criteria for items
          type: object
          properties:
            type:
              description: Type of filter expression
              type: string
              enum:
              - jsonpath
              default: jsonpath
            expression:
              description: Filter expression based on the specified type
              type: string
              example: $[?(@.rating.value >= 4.0 && @.electronic.brand.name == 'Premium Tech')]
          required:
          - type
          - expression
        spatial:
          description: Optional array of spatial constraints (CQL2-JSON semantics).
          type: array
          items:
            $ref: '#/components/schemas/SpatialConstraint'
        media_search:
          $ref: '#/components/schemas/MediaSearch'
      anyOf:
      - required:
        - textSearch
      - required:
        - filters
      - required:
        - spatial
      - required:
        - filters
        - spatial

    MediaInput:
      description: Reference to an image, audio clip, or video used for multimodal search.
      type: object
      properties:
        id:
          description: Client-supplied identifier for this media input.
          type: string
        type:
          description: Media category.
          type: string
          enum:
          - image
          - audio
          - video
        url:
          description: HTTPS URL or data URI pointing to the media resource.
          type: string
          format: uri
        contentType:
          description: MIME type, e.g., image/jpeg, audio/mpeg, video/mp4.
          type: string
        textHint:
          description: Optional pre-extracted text (OCR/ASR) for search augmentation.
          type: string
        language:
          description: Language code (BCP-47) of `textHint` or spoken audio.
          type: string
        startMs:
          description: Optional start offset in milliseconds (for audio/video segments).
          type: integer
        endMs:
          description: Optional end offset in milliseconds (for audio/video segments).
          type: integer
      required:
      - type
      - url
      additionalProperties: false

    MediaSearchOptions:
      description: How the discovery engine should use the provided media inputs.
      type: object
      properties:
        goals:
          description: 'Desired processing goals for the media.'
          type: array
          items:
            type: string
            enum:
            - VISUAL_SIMILARITY
            - VISUAL_OBJECT_DETECT
            - TEXT_FROM_IMAGE
            - TEXT_FROM_AUDIO
            - SEMANTIC_AUDIO_MATCH
            - SEMANTIC_VIDEO_MATCH
        augmentTextSearch:
          description: 'Whether to append extracted text from OCR/ASR to `textSearch`.'
          type: boolean
          default: true
        restrictResultsToMediaProximity:
          description: 'Restrict results to spatial proximity of media-derived coordinates (e.g., EXIF GPS tags).'
          type: boolean
          default: false
      additionalProperties: false

    Location:
      description: 'A **place** represented by **GeoJSON geometry** (Point/Polygon/Multi*) and optional human-readable `address`.
        This unifies all Beckn location fields into a single, widely-adopted representation (GeoJSON).'
      type: object
      properties:
        "@type":
          type: string
          enum:
          - Location
        address:
          description: Optional human-readable address for the same place/area.
          oneOf:
          - type: string
          - $ref: '#/components/schemas/Address'
        geo:
          $ref: '#/components/schemas/GeoJSONGeometry'
      required:
      - geo
      additionalProperties: false
      examples:
        - $ref: '../../examples/v2.1/Location.examples.yaml#/site_point'
        - $ref: '../../examples/v2.1/Location.examples.yaml#/service_area'

    Offer:
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the core offer schema
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          description: "TPD"
          type: string
          enum:
          - Offer
          x-jsonld:
            '@id': schema:Offer
        acceptedPaymentMethod:
          $ref: '#/components/schemas/AcceptedPaymentMethod'
        addOnItems:
          description: Optional extras modeled as items (e.g., toppings, accessories)
          type: array
          items:
            $ref: '#/components/schemas/Item/properties/id'
          x-jsonld:
            '@id': schema:addOn
        addOns:
          description: Optional extra Offers that can be attached (e.g., warranty, gift wrap)
          type: array
          items:
            $ref: '#/components/schemas/Offer/properties/id'
          x-jsonld:
            '@id': schema:addOn
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/Constraint'
        descriptor:
          $ref: '#/components/schemas/Descriptor'
        eligibleRegion:
          description: Regions where the offer is eligible
          type: array
          items:
            $ref: '#/components/schemas/Location'
        id:
          description: Unique id for this offer
          type: string
          x-jsonld:
            '@id': schema:identifier
        isActive:
          description: Whether the offer is active
          type: boolean
          default: true
        items:
          description: Base item(s) the offer applies to (single or bundle)
          type: array
          items:
            $ref: '#/components/schemas/Item/properties/id'
          x-jsonld:
            '@id': schema:itemOffered
          minItems: 1
        offerAttributes:
          description: Attribute Pack attachment (pricing models, discounts, rail terms, etc.)
          allOf:
            - $ref: '#/components/schemas/Attributes'
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        price:
          description: Price snapshot; detailed models can live in offerAttributes
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
        provider:
          description: Seller / provider of this offer
          x-jsonld:
            '@id': schema:seller
          allOf:
            - $ref: '#/components/schemas/Provider/properties/id'
        validity:
          description: Offer validity window
          x-jsonld:
            '@id': schema:availabilityStarts|schema:availabilityEnds
          allOf:
            - $ref: '#/components/schemas/TimePeriod'
      required:
      - '@context'
      - "@type"
      - id
      - descriptor
      - provider
      - items
      additionalProperties: false

    Order:
      type: object
      properties:
        '@context':
          description: "CPD"
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          description: "TPD"
          type: string
          enum:
          - Order
          x-jsonld:
            '@id': beckn:Order
        consumer:
          $ref: '#/components/schemas/Consumer'
        orderDocs:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        fulfillments:
          description: Describes various fulfillments used to deliver the order to the consumer
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Fulfillment'
        id:
          type: string
          x-jsonld:
            '@id': schema:identifier
        invoices:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        orderAttributes:
          description: Order-level Attribute Pack (vertical/regulatory specifics)
          allOf:
            - $ref: '#/components/schemas/Attributes'
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          x-jsonld:
            '@id': schema:orderItem
          minItems: 1
        orderNumber:
          description: Human-visible order number
          type: string
          x-jsonld:
            '@id': schema:orderNumber
        orderStatus:
          description: Order status/state
          type: string
          enum:
          - UNDER_NEGOTIATION
          - CREATED
          - PENDING
          - CONFIRMED
          - INPROGRESS
          - PARTIALLYFULFILLED
          - COMPLETED
          - CANCELLED
          - REJECTED
          - FAILED
          - RETURNED
          - REFUNDED
          - ONHOLD
          x-jsonld:
            '@id': beckn:orderStatus
        orderValue:
          description: Order totals snapshot (derivable from lines; optional)
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        paymentTerms:
          description: Terms of payment agreed upon by the buyer like source and destination accounts, beneficiary, collector, schedule, etc
          allOf:
            - $ref: '#/components/schemas/PaymentTerms'
        paymentAction:
          description: Describes the act of payment
          allOf:
            - $ref: '#/components/schemas/PaymentAction'
        policies:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
        provider:
          $ref: '#/components/schemas/Provider'
      required:
      - '@context'
      - "@type"
      - orderStatus
      - provider
      - consumer
      - orderItems
      additionalProperties: false

    OrderItem:
      type: object
      properties:
        acceptedOffer:
          description: Offer applied to this line (if different from order-level)
          x-jsonld:
            '@id': schema:acceptedOffer
          allOf:
            - $ref: '#/components/schemas/Offer'
        itemId:
          x-jsonld:
            '@id': schema:orderedItem
          allOf:
            - $ref: '#/components/schemas/Item/properties/id'
        lineId:
          description: Unique line id within order
          type: string
        orderItemAttributes:
          description: Line-level Attribute Pack (options, substitutions, ESG, etc.)
          allOf:
            - $ref: '#/components/schemas/Attributes'
        price:
          description: Line price composition (unit/tax/delivery/discount)
          x-jsonld:
            '@id': schema:priceSpecification
          allOf:
            - $ref: '#/components/schemas/PriceSpecification'
        quantity:
          x-jsonld:
            '@id': beckn:quantity
          allOf:
            - $ref: '#/components/schemas/Quantity'
      required:
      - itemId

    Participant: # Check if this should be moved inside Fulfillment
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          default: beckn:Participant
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/Credential'
        displayName:
          type: string
        email:
          type: string
          format: email
        id:
          type: string
        rating:
          $ref: '#/components/schemas/Rating'
        role:
          description: Role of participant (consumer, recipient, rider, patient, operator, etc.)
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        telephone:
          type: string
      required:
      - '@context'
      - "@type"
      - id
      - role
      additionalProperties: false

    PaymentAction:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          const: beckn:PaymentAction
        amount:
          description: Amount associated with this payment action
          type: object
          properties:
            currency:
              type: string
              x-jsonld:
                '@id': schema:priceCurrency
            value:
              type: number
              x-jsonld:
                '@id': schema:price
        paymentStatus:
          description: Payment lifecycle status (Pending | Authorized | Captured | Failed | Refunded | PartialRefund …)
          type: string
          enum:
          - INITIATED
          - PENDING
          - AUTHORIZED
          - CAPTURED
          - COMPLETED
          - FAILED
          - CANCELLED
          - REFUNDED
          - PARTIALLY_REFUNDED
          - CHARGEBACK
          - DISPUTED
          - EXPIRED
          - REVERSED
          - VOIDED
          - SETTLED
          - ON_HOLD
          - ADJUSTED
          x-jsonld:
            '@id': beckn:paymentStatus
        paymentMethod:
          type: object
          '@context':
            type: string
            format: uri
            const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
          "@type":
            type: string
            const: PaymentMethod
          method:
            type: string
        paymentUrl:
          description: URL for payment processing/redirection
          type: string
          x-jsonld:
            '@id': schema:url
          format: uri
          example: https://payments.example.com/pay?transactionId=123&amount=100
        state:
          $ref: '#/components/schemas/State'
        txnRef:
          description: PSP/gateway/bank transaction reference
          type: string
          x-jsonld:
            '@id': schema:transactionNumber
        checkoutAt:
          $ref: '#/components/schemas/CheckoutTerminal'
        paidAt:
          description: The time at which the payment was made
          type: string
          format: date-time
        paymentActionAttributes:
          description: Extensible set of attributes containing payment actions specific to each ecosystem.
          allOf:
            - $ref: '#/components/schemas/Attributes'
      required:
      - '@context'
      - "@type"
      - paymentStatus
      additionalProperties: false

    PaymentTerms:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld
        "@type":
          type: string
          const: beckn:PaymentTerm
        collectedBy:
          description: Describes the entity that first collects the payment from the consumer. This is the actor who is responsible to initiate the settlement process as per the terms described in the settlementTerms property.
          type: string
          enum:
            - BAP
            - BPP
            - ESCROW_AGENT
        checkoutAt:
          $ref: '#/components/schemas/CheckoutTerminal'
        settlementTerms:
          type: array
          items:
            $ref: '#/components/schemas/SettlementTerm'
        checkoutTrigger:
          description: The stage in the order lifecycle when the checkout should be triggered
          allOf:
            - $ref: '#/components/schemas/PaymentTrigger'
        paymentTermsAttributes:
          description: 'Rail-specific attribute pack (e.g., UPI: VPA/UTR; CARD: token/3DS; BNPL: plan/schedule)'
          allOf:
            - $ref: '#/components/schemas/Attributes'

    SettlementTerm:
      description: Describes the terms of settlement associated with a given transaction. This is not to be confused with the PaymentAction as it describes all the places where the money gets disbursed after reconciliation. 
      type: object
      properties:
        '@context':
          type: string
          format: uri
          default: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/draft/schema/core/v2.1/context.jsonld 
        "@type":
          type: string
          default: beckn:SettlementTerm
        amount:
          description: Amount associated with this settlement action
          type: object
          properties:
            currency:
              type: string
              x-jsonld:
                '@id': schema:priceCurrency
            value:
              type: number
              x-jsonld:
                '@id': schema:price
        paymentTrigger:
          description: Describes the event which triggers the payment against this settlement term
          allOf:
            - $ref: '#/components/schemas/PaymentTrigger'
        settlementStatus:
          type: string
          enum:
            - PENDING
            - COMPLETE
        settlementSchedule:
          $ref: '#/components/schemas/SettlementSchedule'
        payTo:
          description: Describes the details of the account where the money must be remited. It could be a bank account, a payment gateway, or a virtual payment address (like a UPI ID)
          anyOf:
            - type: object
              properties:
                accountHolderName:
                  type: string
                accountNumber:
                  type: string
                branchCode:
                  type: string
                bankName:
                  type: string
            - type: object
              properties:
                vpa:
                  type: string
            - type: object
              properties:
                paymentUrl:
                  type: string
                  format: uri
        acceptedPaymentMethods:
          description: Describes the methods or mechanisms accepted by the payee (described in the payTo property) for the purpose of this settlement.
          type: array
          items:
            type: string
            enum:
              - CASH_DEPOSIT
              - BANK_TRANSFER
            additionalProperties: true
        settlementTermAttributes:
          description: Additional use case specific settlement terms that must be adhered to
          allOf:
            - $ref: '#/components/schemas/Attributes'

    PaymentTrigger:
      description: Describes when in the order lifecycle a payment flow should be triggered. Typically useful for initiating checkouts and settlement flows.
      type: string
      enum:
        - PRE_ORDER
        - PRE_FULFILLMENT
        - ON_FULFILLMENT
        - POST_FULFILLMENT

    SettlementSchedule:
      type: object
      additionalProperties: false
      oneOf:
        - type: object
          additionalProperties: false
          required: [tPlusX]
          properties:
            tPlusX:
              type: object
              additionalProperties: false
              required: [value, unit]
              properties:
                value:
                  type: integer
                  minimum: 0
                  description: X in T+X
                unit:
                  type: string
                  enum: [DAY, BUSINESS_DAY]
        - type: object
          additionalProperties: false
          required: [settleBy]
          properties:
            settleByDateTime:
              type: string
              format: date-time
              description: Latest timestamp by which settlement must complete
        - type: object
          additionalProperties: false
          required: [endOf]
          properties:
            settleByEndOf: # To add this as default property
              type: string
              enum: [END_OF_DAY, END_OF_MONTH]

    CheckoutTerminal:
      description: The checkout terminal where the consumer makes the payment
      type: string
      enum:
        - BAP_CHECKOUT
        - BPP_CHECKOUT
        - ESCROW_CHECKOUT_URL
        - PROVIDER_POS
        - FULFILLMENT_AGENT_POS

    Policy:
