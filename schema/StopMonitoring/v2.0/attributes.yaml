openapi: 3.1.0
info:
  title: StopMonitoring
  version: 2.0.0
  description: Schema definition for the StopMonitoring entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    StopMonitoring:
      type: object
      title: StopMonitoring
      description: A real-time data service providing predicted arrivals and departures
        of vehicles at a specific stop.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        stopRef:
          description: Reference to the stop being monitored
          $ref: https://schema.beckn.io/Stop/v2.0/attributes.yaml#/components/schemas/Stop
        monitoredCalls:
          description: List of real-time arrival/departure calls at this stop
          $ref: https://schema.beckn.io/MonitoredCall/v2.0/attributes.yaml#/components/schemas/MonitoredCall
        responseTimestamp:
          description: Timestamp of this stop monitoring response
          type: string
          format: date-time
        id:
          description: Unique identifier for the tracking record
          type: string
        url:
          description: URL endpoint for real-time tracking information
          type: string
          format: uri
        status:
          description: Current tracking status
          $ref: https://schema.beckn.io/State/v2.0/attributes.yaml#/components/schemas/State
        validity:
          description: Validity period for this tracking record
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
      additionalProperties: false
