openapi: 3.1.0
info:
  title: Fare
  version: 2.0.0
  description: Schema definition for the Fare entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Fare:
      type: object
      title: Fare
      description: The monetary cost of travel for a specific journey or service,
        calculated based on applicable fare rules and passenger categories.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        fareId:
          description: Unique identifier for the fare
          type: string
        amount:
          description: Total fare amount
          type: number
        currency:
          description: ISO 4217 currency code
          type: string
        fareAttributes:
          description: Transfer permissions, agency, and transfer limit
          type: string
        fareRules:
          description: Leg rules that determine when this fare applies
          $ref: https://schema.beckn.io/FareLegRule/v2.0/attributes.yaml#/components/schemas/FareLegRule
        id:
          description: Unique identifier for the offer
          type: string
        descriptor:
          description: Human-readable description of the offer
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        price:
          description: Price specification for this offer
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        validity:
          description: Validity period of the offer
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        tags:
          description: Tags or labels associated with the offer
          type: string
      additionalProperties: false
