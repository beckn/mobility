openapi: 3.1.0
info:
  title: Seat
  version: 2.0.0
  description: Schema definition for the Seat entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Seat:
      type: object
      title: Seat
      description: A specific seat position reserved or assigned to a passenger on
        a flight, train, or other transport service.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        seatId:
          description: Unique identifier or label for the seat
          type: string
        row:
          description: Row designation (number or letter)
          type: string
        column:
          description: Column or seat letter within the row
          type: string
        seatType:
          description: Type of seat (e.g. WINDOW, AISLE, MIDDLE, UPPER_BERTH)
          type: string
        seatCharacteristics:
          description: Additional characteristics (e.g. EXTRA_LEGROOM, QUIET_ZONE,
            ACCESSIBLE)
          type: string
        deckLevel:
          description: Deck or level (UPPER, LOWER, MAIN)
          type: string
        id:
          description: Unique identifier for the entitlement
          type: string
        descriptor:
          description: Human-readable information about the entitlement
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        resource:
          description: The resource being accessed against this entitlement
          $ref: https://schema.beckn.io/ContractItem/v2.0/attributes.yaml#/components/schemas/ContractItem
        credentials:
          description: Credential descriptors for the entitlement
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
      additionalProperties: false
