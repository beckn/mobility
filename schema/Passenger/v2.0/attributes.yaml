openapi: 3.1.0
info:
  title: Passenger
  version: 2.0.0
  description: Schema definition for the Passenger entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Passenger:
      type: object
      title: Passenger
      description: A person who travels using a transport service and is identified
        in a booking or travel document.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        passengerId:
          description: Unique identifier for the passenger in this booking
          type: string
        passengerType:
          description: Classification of passenger (e.g. ADULT, CHILD, SENIOR, STUDENT)
          type: string
        specialRequirements:
          description: Accessibility or special assistance requirements
          type: string
        id:
          description: Unique identifier for the participant
          type: string
        person:
          description: Personal details of the participant
          $ref: https://schema.beckn.io/Person/v2.0/attributes.yaml#/components/schemas/Person
        organization:
          description: Organisation the participant belongs to
          $ref: https://schema.beckn.io/Organization/v2.0/attributes.yaml#/components/schemas/Organization
        entitlements:
          description: Entitlements held by the participant
          $ref: https://schema.beckn.io/Entitlement/v2.0/attributes.yaml#/components/schemas/Entitlement
      additionalProperties: false
