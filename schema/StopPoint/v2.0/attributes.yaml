openapi: 3.1.0
info:
  title: StopPoint
  version: 2.0.0
  description: Schema definition for the StopPoint entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    StopPoint:
      type: object
      title: StopPoint
      description: An abstract or scheduled point in a public transport network at
        which passengers can board or alight from a service.
      x-tags:
        - mobility
        - geosparql
        - ride-hailing
      properties:
        stopPointId:
          description: Unique identifier for the stop point
          type: string
        shortName:
          description: Short display name or code
          type: string
        publicCode:
          description: Publicly visible code displayed at the stop
          type: string
        stopAreaRef:
          description: Reference to the stop area this point belongs to
          $ref: https://schema.beckn.io/StopArea/v2.0/attributes.yaml#/components/schemas/StopArea
        id:
          description: Unique identifier for the fulfillment stop
          type: string
        location:
          description: Geographic location of the stop
          $ref: https://schema.beckn.io/Location/v2.0/attributes.yaml#/components/schemas/Location
        type:
          description: Type of stop (start, end, intermediate)
          type: string
        instructions:
          description: Instructions for passengers at this stop
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        time:
          description: Expected time window at this stop
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
      additionalProperties: false
