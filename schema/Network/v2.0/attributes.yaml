openapi: 3.1.0
info:
  title: Network
  version: 2.0.0
  description: Schema definition for the Network entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Network:
      type: object
      title: Network
      description: A grouping of routes and lines operated under a common brand or
        authority, used for fare and operational management.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        networkId:
          description: Unique identifier for the network
          type: string
        networkName:
          description: Human-readable name of the network
          type: string
        operatorRef:
          description: Operator(s) running services within this network
          $ref: https://schema.beckn.io/Operator/v2.0/attributes.yaml#/components/schemas/Operator
        lines:
          description: Lines that belong to this network
          $ref: https://schema.beckn.io/Line/v2.0/attributes.yaml#/components/schemas/Line
        id:
          description: Unique identifier for the catalog
          type: string
        descriptor:
          description: Human-readable description of the catalog
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        tags:
          description: Tags associated with the catalog
          type: string
      additionalProperties: false
