openapi: 3.1.0
info:
  title: Telemetry
  version: 2.0.0
  description: Schema definition for the Telemetry entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Telemetry:
      type: object
      title: Telemetry
      description: Time-series data streams reporting the real-time location, speed,
        and operational state of a mobility vehicle or asset.
      properties:
        vehicleId:
          description: Identifier of the vehicle transmitting telemetry
          type: string
        timestamp:
          description: Timestamp of the telemetry reading
          type: string
          format: date-time
        latitude:
          description: Latitude in WGS-84 decimal degrees
          type: number
        longitude:
          description: Longitude in WGS-84 decimal degrees
          type: number
        speed:
          description: Current speed in kilometres per hour
          type: number
        bearing:
          description: Direction of travel in degrees (0=north, 90=east)
          type: number
        batteryLevel:
          description: Battery charge percentage (for electric vehicles)
          type: number
        odometer:
          description: Odometer reading in metres since vehicle start
          type: number
        id:
          description: Unique identifier for the tracking record
          type: string
        url:
          description: URL endpoint for real-time tracking information
          type: string
          format: uri
        status:
          description: Current tracking status
          $ref: https://schema.beckn.io/core/v2.0/schema.json#/$defs/State
        validity:
          description: Validity period for this tracking record
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
      additionalProperties: false
