openapi: 3.1.0
info:
  title: TripResult
  version: 2.0.0
  description: Schema definition for the TripResult entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    TripResult:
      type: object
      title: TripResult
      description: The result of a trip planning request, containing one or more journey
        options with leg details and timing.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        itineraries:
          description: List of itinerary options in the result
          $ref: https://schema.beckn.io/Itinerary/v2.0/attributes.yaml#/components/schemas/Itinerary
        requestRef:
          description: Reference to the originating trip request
          $ref: https://schema.beckn.io/TripRequest/v2.0/attributes.yaml#/components/schemas/TripRequest
        id:
          description: Unique identifier for the catalog
          type: string
        descriptor:
          description: Human-readable description of the catalog
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        tags:
          description: Tags associated with the catalog
          type: string
      additionalProperties: false
