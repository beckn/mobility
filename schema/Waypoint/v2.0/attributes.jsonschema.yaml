$schema: https://json-schema.org/draft/2020-12/schema
title: Waypoint JSON Schema
type: object
properties:
  components:
    type: object
    properties:
      schemas:
        type: object
        properties:
          Waypoint:
            $ref: '#/$defs/Waypoint'
        additionalProperties: false
    required:
    - schemas
    additionalProperties: false
required:
- components
additionalProperties: false
$defs:
  Waypoint:
    type: object
    title: Waypoint
    description: 'A Waypoint is an intermediate stop or checkpoint on a logistics
      route, such as a sorting hub, relay station, or customs checkpoint. Maps to
      beckn:Stop.

      '
    required:
    - id
    - place
    properties:
      id:
        type: string
        example: WPT-HYD-001
      name:
        type: string
        example: Hyderabad Sorting Hub
      place:
        $ref: https://schema.beckn.io/LogisticsPlace/v2.0/attributes.yaml#/components/schemas/LogisticsPlace
      type:
        type: string
        enum:
        - HUB
        - RELAY_POINT
        - CUSTOMS
        - PICKUP
        - DELIVERY
        example: HUB
      sequenceNumber:
        type: integer
        description: Order of this waypoint in the route
        example: 2
      scheduledArrival:
        type: string
        format: date-time
      scheduledDeparture:
        type: string
        format: date-time
      actualArrival:
        type: string
        format: date-time
      actualDeparture:
        type: string
        format: date-time
      dwellTimeMinutes:
        type: integer
        description: Expected dwell time at this waypoint in minutes
        example: 120
      handoverRequired:
        type: boolean
        description: Whether shipment changes carrier/vehicle at this point
        example: true
      status:
        type: string
        enum:
        - PENDING
        - REACHED
        - DEPARTED
        - SKIPPED
