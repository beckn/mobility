openapi: 3.1.0
info:
  title: DropPolicy
  version: 2.0.0
  description: Schema definition for the DropPolicy entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    DropPolicy:
      type: object
      title: DropPolicy
      description: A set of rules governing the locations and conditions under which
        passengers may be dropped off at the end of a ride-hailing or on-demand transport
        service.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        allowedDropAreas:
          description: Geographic areas where drop-off is permitted
          $ref: https://schema.beckn.io/Geofence/v2.0/attributes.yaml#/components/schemas/Geofence
        dropConditions:
          description: Conditions that must be met for a valid drop-off
          type: string
        dropNote:
          description: Customer-facing note about drop-off rules
          type: string
        id:
          description: Unique identifier for the policy
          type: string
        policyType:
          description: Type of policy (extensible term)
          type: string
        descriptor:
          description: Human-readable description of the policy
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        validity:
          description: Validity window for this policy version
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        policyAttributes:
          description: Extensible domain-specific policy attributes
          $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
      additionalProperties: false
