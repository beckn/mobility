openapi: 3.1.0
info:
  title: SalesOfferPackage
  version: 2.0.0
  description: Schema definition for the SalesOfferPackage entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    SalesOfferPackage:
      type: object
      title: SalesOfferPackage
      description: A combination of one or more fare products bundled for sale through
        a specific distribution channel.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        fareProducts:
          description: Fare products included in this sales package
          $ref: https://schema.beckn.io/FareProduct/v2.0/attributes.yaml#/components/schemas/FareProduct
        distributions:
          description: Channels through which this package can be purchased
          $ref: https://schema.beckn.io/DistributionChannel/v2.0/attributes.yaml#/components/schemas/DistributionChannel
        conditionsOfTravel:
          description: Conditions applying to the use of this package
          type: string
        id:
          description: Unique identifier for the offer
          type: string
        descriptor:
          description: Human-readable description of the offer
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        price:
          description: Price specification for this offer
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        validity:
          description: Validity period of the offer
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        tags:
          description: Tags or labels associated with the offer
          type: string
      additionalProperties: false
