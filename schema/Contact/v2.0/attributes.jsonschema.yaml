$schema: https://json-schema.org/draft/2020-12/schema
title: Contact JSON Schema
type: object
properties:
  components:
    type: object
    properties:
      schemas:
        type: object
        properties:
          Contact:
            $ref: '#/$defs/Contact'
        additionalProperties: false
    required:
    - schemas
    additionalProperties: false
required:
- components
additionalProperties: false
$defs:
  Contact:
    type: object
    title: Contact
    description: Contact information for sender, receiver, driver, or operator.
    properties:
      name:
        type: string
        example: Priya Mehta
      phone:
        type: string
        example: '+919876543210'
      email:
        type: string
        format: email
        example: priya.mehta@email.com
      alternatePhone:
        type: string
      company:
        type: string
        description: Company name if B2B contact
      gstNumber:
        type: string
        description: GST number for B2B invoicing
