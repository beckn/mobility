openapi: 3.1.0
info:
  title: FareProduct
  version: 2.0.0
  description: Schema definition for the FareProduct entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    FareProduct:
      type: object
      title: FareProduct
      description: A purchasable entitlement to travel defining conditions of use,
        validity, and applicable passenger categories.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        fareProductId:
          description: Unique identifier for the fare product
          type: string
        riderCategoryId:
          description: Passenger category eligible for this fare product
          $ref: https://schema.beckn.io/RiderCategory/v2.0/attributes.yaml#/components/schemas/RiderCategory
        durationType:
          description: Duration basis (e.g. SINGLE_TRIP, DAILY, MONTHLY)
          type: string
        mediaDuration:
          description: Duration for which the fare product is valid
          type: string
          format: duration
        fixedStartDate:
          description: Fixed start date for calendar-based fare products
          type: string
          format: date-time
        id:
          description: Unique identifier for the offer
          type: string
        descriptor:
          description: Human-readable description of the offer
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        price:
          description: Price specification for this offer
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        validity:
          description: Validity period of the offer
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
        tags:
          description: Tags or labels associated with the offer
          type: string
      additionalProperties: false
