openapi: 3.1.0
info:
  title: Driver
  version: 2.0.0
  description: Schema definition for the Driver entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Driver:
      type: object
      title: Driver
      description: A person who operates a transport vehicle and is responsible for
        the safe delivery of passengers during a mobility service trip.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        licenseNumber:
          description: Driver's license number
          type: string
        vehicleNumber:
          description: Registration number of the vehicle being driven
          type: string
        yearsOfExperience:
          description: Number of years of professional driving experience
          type: number
        id:
          description: Unique identifier for the fulfillment agent
          type: string
        person:
          description: Personal details of the agent
          $ref: https://schema.beckn.io/Person/v2.0/attributes.yaml#/components/schemas/Person
        organization:
          description: Organisation the agent belongs to
          $ref: https://schema.beckn.io/Organization/v2.0/attributes.yaml#/components/schemas/Organization
        contact:
          description: Contact information for the agent
          type: string
        rating:
          description: Overall rating of the agent
          $ref: https://schema.beckn.io/Rating/v2.0/attributes.yaml#/components/schemas/Rating
      additionalProperties: false
