openapi: 3.1.0
info:
  title: Feedback
  version: 2.0.0
  description: Schema definition for the Feedback entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Feedback:
      type: object
      title: Feedback
      description: A passenger's qualitative assessment or textual comment about a
        completed trip, driver, or mobility service.
      properties:
        feedbackText:
          description: Textual content of the feedback
          type: string
        feedbackType:
          description: Category of feedback (e.g. COMPLIMENT, COMPLAINT, SUGGESTION)
          type: string
        serviceComponent:
          description: Component of the service being reviewed (e.g. DRIVER, VEHICLE,
            APP)
          type: string
        id:
          description: Unique identifier for the feedback
          type: string
        descriptor:
          description: Feedback content and form
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        rating:
          description: Rating associated with this feedback
          $ref: https://schema.beckn.io/Rating/v2.0/attributes.yaml#/components/schemas/Rating
      additionalProperties: false
