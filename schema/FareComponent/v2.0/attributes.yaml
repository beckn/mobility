openapi: 3.1.0
info:
  title: FareComponent
  version: 2.0.0
  description: Schema definition for the FareComponent entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    FareComponent:
      type: object
      title: FareComponent
      description: A component of an air travel fare that applies to a specific flight
        segment or leg, used in aviation pricing.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        fareBasisCode:
          description: IATA fare basis code identifying the fare type
          type: string
        cabin:
          description: Cabin class (ECONOMY, BUSINESS, FIRST)
          type: string
        bookingCode:
          description: Booking class code (e.g. Y, M, K)
          type: string
        amount:
          description: Fare amount for this component
          type: number
        currency:
          description: ISO 4217 currency code
          type: string
        segmentRef:
          description: Flight segment this fare component applies to
          $ref: https://schema.beckn.io/FlightSegment/v2.0/attributes.yaml#/components/schemas/FlightSegment
        title:
          description: Title or label of this price component
          type: string
        price:
          description: Monetary value of this component
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        tags:
          description: Tags associated with this price component
          type: string
      additionalProperties: false
