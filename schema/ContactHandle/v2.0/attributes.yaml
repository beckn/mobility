openapi: 3.1.0
info:
  title: ContactHandle
  version: 2.0.0
  description: Schema definition for the ContactHandle entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    ContactHandle:
      type: object
      title: ContactHandle
      description: A communication handle (such as a phone number, email address,
        or chat URL) used to contact a driver or support agent in a mobility service.
      properties:
        handleType:
          description: Type of contact handle (PHONE, EMAIL, CHAT, APP)
          type: string
        handle:
          description: The actual contact handle value (number, address, or URL)
          type: string
        label:
          description: Human-readable label for this contact handle
          type: string
        phone:
          description: Support phone number
          type: string
        email:
          description: Support email address
          type: string
        url:
          description: URL to support portal or chat interface
          type: string
          format: uri
      additionalProperties: false
