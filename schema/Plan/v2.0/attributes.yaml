openapi: 3.1.0
info:
  title: Plan
  version: 2.0.0
  description: Schema definition for the Plan entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Plan:
      type: object
      title: Plan
      description: A journey planning response containing one or more itinerary options
        for a given trip request.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        requestedTime:
          description: The departure or arrival time that was requested
          type: string
          format: date-time
        itineraries:
          description: List of itinerary options returned in the plan
          $ref: https://schema.beckn.io/Itinerary/v2.0/attributes.yaml#/components/schemas/Itinerary
        from:
          description: Origin location for this plan
          $ref: https://schema.beckn.io/Location/v2.0/attributes.yaml#/components/schemas/Location
        to:
          description: Destination location for this plan
          $ref: https://schema.beckn.io/Location/v2.0/attributes.yaml#/components/schemas/Location
        id:
          description: Unique identifier for the catalog
          type: string
        descriptor:
          description: Human-readable description of the catalog
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        tags:
          description: Tags associated with the catalog
          type: string
      additionalProperties: false
