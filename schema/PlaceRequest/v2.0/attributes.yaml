openapi: 3.1.0
info:
  title: PlaceRequest
  version: 2.0.0
  description: Schema definition for the PlaceRequest entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    PlaceRequest:
      type: object
      title: PlaceRequest
      description: A request for a specific accommodation or seat assignment within
        a transport service during the booking process.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        accommodationType:
          description: Type of accommodation requested (e.g. SEAT, BERTH, COMPARTMENT)
          type: string
        preferences:
          description: Passenger preferences (e.g. window, aisle, quiet zone)
          type: string
        seatRef:
          description: Specific seat requested, if applicable
          $ref: https://schema.beckn.io/Seat/v2.0/attributes.yaml#/components/schemas/Seat
        id:
          description: Unique identifier for the contract item
          type: string
        descriptor:
          description: Human-readable description of the item
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        price:
          description: Price for this contract item
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        quantity:
          description: Quantity of this contract item
          $ref: https://schema.beckn.io/Quantity/v2.0/attributes.yaml#/components/schemas/Quantity
      additionalProperties: false
