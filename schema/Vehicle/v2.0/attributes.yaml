openapi: 3.1.0
info:
  title: Vehicle
  version: 2.0.0
  description: Schema definition for the Vehicle entity in the Beckn Mobility domain.
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    Vehicle:
      type: object
      title: Vehicle
      description: A motorized or human-powered mobility asset used to carry passengers
        or goods between locations.
      x-tags:
        - mobility
        - schema-org
        - ride-hailing
      properties:
        vehicleId:
          description: Unique identifier for the vehicle
          type: string
        licensePlate:
          description: Vehicle registration plate number
          type: string
        make:
          description: Manufacturer of the vehicle
          type: string
        model:
          description: Model name of the vehicle
          type: string
        year:
          description: Year of manufacture
          type: number
        color:
          description: Colour of the vehicle
          type: string
        vehicleType:
          description: Type classification of the vehicle
          $ref: https://schema.beckn.io/VehicleType/v2.0/attributes.yaml#/components/schemas/VehicleType
        id:
          description: Unique identifier for the item
          type: string
        descriptor:
          description: Human-readable description of the item
          $ref: https://schema.beckn.io/core/v2.0/Descriptor/attributes.yaml#components/schemas/Descriptor
        categoryId:
          description: Category code classifying the item
          $ref: https://schema.beckn.io/CategoryCode/v2.1/attributes.yaml#/components/schemas/CategoryCode
        price:
          description: Price specification for this item
          $ref: https://schema.beckn.io/PriceSpecification/v2.1/attributes.yaml#/components/schemas/PriceSpecification
        quantity:
          description: Available quantity of the item
          $ref: https://schema.beckn.io/Quantity/v2.0/attributes.yaml#/components/schemas/Quantity
        tags:
          description: Tags associated with the item
          type: string
      additionalProperties: false
