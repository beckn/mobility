openapi: 3.1.0
info:
  title: StopTimeUpdate
  version: 2.0.0
  description: Schema definition for the StopTimeUpdate entity in the Beckn Mobility
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    StopTimeUpdate:
      type: object
      title: StopTimeUpdate
      description: A real-time update to the predicted arrival or departure time of
        a vehicle at a specific stop within a journey.
      x-tags:
        - mobility
        - ride-hailing
      properties:
        stopId:
          description: Reference to the stop being updated
          $ref: https://schema.beckn.io/Stop/v2.0/attributes.yaml#/components/schemas/Stop
        stopSequence:
          description: Sequence of this stop in the trip
          type: number
        arrivalDelay:
          description: Arrival delay in seconds (negative = early)
          type: number
        departureDelay:
          description: Departure delay in seconds (negative = early)
          type: number
        scheduleRelationship:
          description: Relationship to schedule (SCHEDULED, SKIPPED, NO_DATA)
          type: string
        id:
          description: Unique identifier for the tracking record
          type: string
        url:
          description: URL endpoint for real-time tracking information
          type: string
          format: uri
        status:
          description: Current tracking status
          $ref: https://schema.beckn.io/State/v2.0/attributes.yaml#/components/schemas/State
        validity:
          description: Validity period for this tracking record
          $ref: https://schema.beckn.io/TimePeriod/v2.0/attributes.yaml#/components/schemas/TimePeriod
      additionalProperties: false
