properties:
  message:
    properties:
      order:
        properties:
          fulfillments:
            type: array
            minItems: 1
            items:
              properties:
                stops:
                  items:
                    properties:
                      authorization:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - OTP
                              - QR
                          token:
                            type: string
                            pattern: '^-?\d+(\.\d+)?$'
                        required:
                          - type
                          - token
