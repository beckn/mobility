#structure it like u did for search SETTLEMENT_TERMS
properties:
  message:
    properties:
      order:
        properties:
          items:
            items:
              properties:
                tags:
                  items:
                    if:
                      properties:
                        descriptor:
                          properties:
                            code:
                              const: FARE_POLICY
                    then:
                      properties:
                        list:
                          type: array
                          items:
                            allOf:
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          enum:
                                            - MIN_FARE
                                            - MIN_FARE_DISTANCE_KM
                                            - PER_KM_CHARGE
                                            - PICKUP_CHARGE
                                            - WAITING_CHARGE_PER_MIN
                                            - NIGHT_CHARGE_MULTIPLIER
                                then:
                                  properties:
                                    value:
                                      type: string
                                      pattern: '^-?\d+(\.\d+)?$'
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          enum:
                                            - NIGHT_SHIFT_START_TIME
                                            - NIGHT_SHIFT_END_TIME
                                then:
                                  properties:
                                    value:
                                      type: string
                                      #format: time
                                      pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$'
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: EXTERNAL_REF
                                then:
                                  properties:
                                    value:
                                      type: string
                                      #format: uri
                                      pattern: '^https?://[^\s/$.?#].[^\s]*$'
                                  required:
                                    - descriptor
                                    - value