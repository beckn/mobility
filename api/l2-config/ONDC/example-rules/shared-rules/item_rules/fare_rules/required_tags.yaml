#structure it like u did for search SETTLEMENT_TERMS
properties:
  message:
    properties:
      order:
        properties:
          items:
            items:
              properties:
                tags:
                  items:
                    if:
                      properties:
                        descriptor:
                          properties:
                            code:
                              const: FARE_POLICY
                    then:
                      properties:
                        list: # there should not be a "type: array" block below this. dont know the reason yet.
                          allOf:
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: MIN_FARE
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^[0-9]+(\.[0-9]+)?$'
                                required:
                                  - descriptor
                                  - value
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: MIN_FARE_DISTANCE_KM
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^[0-9]+(\.[0-9]+)?$'
                                required:
                                  - descriptor
                                  - value
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: PER_KM_CHARGE
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^[0-9]+(\.[0-9]+)?$'
                                required:
                                  - descriptor
                                  - value
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: PICKUP_CHARGE
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^[0-9]+(\.[0-9]+)?$'
                                required:
                                  - descriptor
                                  - value
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: WAITING_CHARGE_PER_MIN
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^[0-9]+(\.[0-9]+)?$'
                                required:
                                  - descriptor
                                  - value
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: NIGHT_CHARGE_MULTIPLIER
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^[0-9]+(\.[0-9]+)?$'
                                required:
                                  - descriptor
                                  - value
                            - contains:
                                type: object
                                properties:
                                  descriptor:
                                    type: object
                                    properties:
                                      code:
                                        const: NIGHT_SHIFT_START_TIME
                                    required:
                                      - code
                                  value:
                                    type: string
                                    pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$'
                                required:
                                  - descriptor
                                  - value
