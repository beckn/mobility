properties:
  message:
    properties:
      order:
        properties:
          quote:
            type: object
            properties:
              price:
                type: object
                properties:
                  currency:
                    type: string
                  value:
                    type: string
                    pattern: '^\d+(\.\d{1,2})?$'
                required:
                  - currency
                  - value
              breakup:
                type: array
                items:
                  type: object
                  properties:
                    price:
                      type: object
                      properties:
                        currency:
                          type: string
                        value:
                          type: string
                          pattern: '^\d+(\.\d{1,2})?$'
                      required:
                        - currency
                        - value
                    title:
                      type: string
                      enum:
                        - BASE_FARE
                        - DISTANCE_FARE
                        - TAX
                        - DISCOUNT
                        - WAITING_CHARG
                        - CANCELLATION_CHARGES
                  required:
                    - price
                    - title
            required:
              - price
              - breakup
        required:
          - quote
