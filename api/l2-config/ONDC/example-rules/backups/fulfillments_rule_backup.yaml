properties:
  message:
    properties:
      order:
        properties:
          fulfillments:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                stops:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    properties:
                      location:
                        type: object
                        properties:
                          gps:
                            type: string
                        required:
                          - gps
                      type:
                        type: string
                        enum:
                          - START
                          - END
                      authorization:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - OTP
                          token:
                            type: string
                            pattern: '^-?\d+(\.\d+)?$'
                        required:
                          - type
                          - token
                    required:
                      - location
                      - type
                state:
                  type: object
                  properties:
                    descriptor:
                      type: object
                      properties:
                        code:
                          type: string
                          enum:
                            - RIDE_ASSIGNED
                            - RIDE_ENROUTE_PICKUP
                            - RIDE_ARRIVED_PICKUP
                            - RIDE_STARTED
                            - RIDE_ENDED
                            - RIDE_CANCELLED
                      required:
                        - code
                vehicle:
                  properties:
                    category:
                      type: string
                      enum:
                        - AUTO_RICKSHAW
                        - CAB
                  required:
                    - category
                type:
                  type: string
                  enum:
                    - DELIVERY
              required:
                - stops
                - id
                - type
                - vehicle
        required:
          - fulfillments
