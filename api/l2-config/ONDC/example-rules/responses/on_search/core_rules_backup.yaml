properties:
  message:    
    properties:
      catalog:
        type: object
        properties:
          descriptor:
            type: object
            properties:
              name:
                type: string
              images:
                type: array
                items:
                  minItems: 1  # Ensure at least one image
            required:
              - name
          providers:
            type: array
            minItems: 1  # Ensure at least one provider
            items:
              type: object
              properties:
                id:
                  type: string
                descriptor:
                  type: object
                  properties:
                    name:
                      type: string
                    images:
                      type: array
                      items:
                        minItems: 1  # Ensure at least one image
                  required:
                    - name
                fulfillments:
                  type: array
                  minItems: 1 # Ensure at least one fulfillment
                  items:
                    properties:
                      vehicle:
                        properties:
                          category:
                            type: string
                            enum:
                              - AUTO_RICKSHAW
                              - CAB
                        required:
                          - category
                      type:
                        type: string
                        enum:
                          - DELIVERY
                    required:
                      - id
                      - vehicle
                      - type
                items:
                  type: array
                  minItems: 1  # Ensure at least one item
                  items:
                    type: object
                    properties:
                      descriptor:
                        type: object
                        properties:
                          name:
                            type: string
                          code:
                            type: string
                            enum:
                              - RIDE
                          # Add any other descriptor properties here
                        required:
                          - name
                          - code
                      price:
                        type: object
                        properties:
                          value:
                            type: number
                          # Add any other price properties here
                        required:
                          - value
                    required:
                      - id
                      - descriptor
                payments:
                  type: array
                  minItems: 1  # Ensure at least one payment
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      collected_by:
                        type: string
                    required:
                      - type
                      - collected_by
              required:
                - id
                - fulfillments
                - items
                - payments
        required:
          - descriptor
          - providers
