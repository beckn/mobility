properties:
  message:
    properties:
      order:
        properties:
          fulfillments:
            type: array
            minItems: 1
            items:
              type: object
              properties:
                stops:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    properties:
                      location:
                        type: object
                        properties:
                          gps:
                            type: string
                        required:
                          - gps
                      type:
                        type: string
                        enum:
                          - START
                          - END
                    required:
                      - location
                      - type
                state:
                  type: object
                  properties:
                    descriptor:
                      type: object
                      properties:
                        code:
                          type: string
                          enum:
                            - DRIVER_EN_ROUTE_TO_PICKUP
                            - DRIVER_AT_PICKUP
                            - RIDE_STARTED
                            - RIDE_ENDED
                            - RIDE_CANCELLED
                            - PAYMENT_COLLECTED
                      required:
                        - code
              required:
                - stops
        required:
          - fulfillments
