properties:
  message:
    properties:
      order:
        properties:
          quote:
            type: object
            properties:
              price:
                type: object
                properties:
                  currency:
                    type: string
                  value:
                    type: number
                required:
                  - currency
                  - value
              breakup:
                type: array
                items:
                  type: object
                  properties:
                    price:
                      type: number
                    title:
                      type: string
                      enum:
                        - BASE FARE
                        - TAX
                        - DISCOUNT
                        - WAITING CHARGE
                  required:
                    - price
                    - title
            required:
              - price
              - breakup
        required:
          - quote
