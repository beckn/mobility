properties:
  message:
    properties:
      order:
        properties:
          fulfillment:
            type: object
            properties:
              agent:
                type: object
                properties:
                  contact:
                    type: object
                  person:
                    type: object
                required:
                  - contact
                  - person
              customer:
                type: object
                properties:
                  contact:
                    type: object
                  person:
                    type: object
                required:
                  - contact
                  - person
              state:
                type: object
                properties:
                  descriptor:
                    type: object
                    properties:
                      code:
                        type: string
                    required:
                      - code
                required:
                  - descriptor
              vehicle:
                type: object
                properties:
                  registration:
                    type: string
                required:
                  - registration
            required:
              - agent
              - customer
              - state
              - vehicle
          payment:
            type: object
            properties:
              type:
                type: string
              params:
                type: object
                properties:
                  transaction_id:
                    type: string
            required:
              - type
            allOf:
              - if:
                  properties:
                    type:
                      const: PRE-ORDER
                then:
                  properties:
                    params:
                      required:
                        - transaction_id
        required:
          - fulfillment
          - payment
