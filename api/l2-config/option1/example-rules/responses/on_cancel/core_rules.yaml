properties:
  message:
    properties:
      order:
        type: object
        properties:
          cancellation:
            type: object
            properties:
              cancelled_by:
                type: string
                enum:
                  - CONSUMER
                  - PROVIDER
              time:
                type: string
                format: date-time
            required:
              - cancelled_by
              - time
          fulfillments:
            type: array
            items:
              type: object
              properties:
                state:
                  type: object
                  properties:
                    descriptor:
                      type: object
                      properties:
                        code:
                          type: string
                          enum:
                            - RIDE_CANCELLED
                      required:
                        - code
        required:
          - cancellation
          - fulfillments
