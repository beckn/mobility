properties:
  message:    
    properties:
      catalog:
        type: object
        properties:
          descriptor:
            type: object
            properties:
              name:
                type: string
              images:
                type: array
                items:
                  minItems: 1  # Ensure at least one image
            required:
              - name
              - images
          providers:
            type: array
            minItems: 1  # Ensure at least one provider
            items:
              type: object
              properties:
                id:
                  type: string
                descriptor:
                  type: object
                  properties:
                    name:
                      type: string
                    images:
                      type: array
                      items:
                        minItems: 1  # Ensure at least one image
                  required:
                    - name
                    - images
                fulfillments:
                  type: array
                  items:
                    minItems: 1  # Ensure at least one fulfillment
                items:
                  type: array
                  minItems: 1  # Ensure at least one item
                  items:
                    type: object
                    properties:
                      descriptor:
                        type: object
                        properties:
                          name:
                            type: string
                          # Add any other descriptor properties here
                        required:
                          - name
                      price:
                        type: object
                        properties:
                          value:
                            type: number
                          # Add any other price properties here
                        required:
                          - value
                payments:
                  type: array
                  minItems: 1  # Ensure at least one payment
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      collected_by:
                        type: string
                    required:
                      - type
                      - collected_by
        required:
          - descriptor
          - providers
