#structure it like u did for search SETTLEMENT_TERMS
properties:
  message:
    properties:
      order:
        properties:
          payments:
            items:
              properties:
                tags:
                  items:
                    if:
                      properties:
                        descriptor:
                          properties:
                            code:
                              const: SETTLEMENT_TERMS
                    then:
                      properties:
                        list:
                          type: array
                          items:
                            allOf:
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: SETTLEMENT_WINDOW
                                then:
                                  properties:
                                    value:
                                      type: string
                                      pattern: '^P(?!$)(?:\d+Y)?(?:\d+M)?(?:\d+W)?(?:\d+D)?(?:T(?=\d)(?:\d+H)?(?:\d+M)?(?:\d+S)?)?$'
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: SETTLEMENT_BASIS
                                then:
                                  properties:
                                    value:
                                      type: string
                                      enum:
                                        - INVOICE_RECEIPT
                                        - DELIVERY
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: MANDATORY_ARBITRATION
                                then:
                                  properties:
                                    value:
                                      type: string
                                      pattern: '^(true|false)$'
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: STATIC_TERMS
                                then:
                                  properties:
                                    value:
                                      type: string
                                      format: uri
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: COURT_JURISDICTION
                                then:
                                  properties:
                                    value:
                                      type: string
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: DELAY_INTEREST
                                then:
                                  properties:
                                    value:
                                      type: string
                                      pattern: '^\d+(\.\d{1,2})?$'
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: SETTLEMENT_TYPE
                                then:
                                  properties:
                                    value:
                                      type: string
                                      enum:
                                        - UPI
                                        - NEFT
                                        - RTGS
                                  required:
                                    - descriptor
                                    - value
                              - if:
                                  properties:
                                    descriptor:
                                      properties:
                                        code:
                                          const: SETTLEMENT_AMOUNT
                                then:
                                  properties:
                                    value:
                                      type: string
                                      pattern: '^\d+(\.\d{1,2})?$'
                                  required:
                                    - descriptor
                                    - value