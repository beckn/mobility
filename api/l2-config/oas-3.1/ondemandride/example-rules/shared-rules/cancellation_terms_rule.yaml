properties:
  message:
    properties:
      order:
        properties:
          cancellation_terms:
            items:
              properties:
                fulfillment_state:
                  properties:
                    descriptor:
                      properties:
                        code:
                          type: string
                          enum:
                            - RIDE_ASSIGNED
                            - RIDE_ENROUTE_PICKUP
                            - RIDE_ARRIVED_PICKUP
                            - RIDE_STARTED
                      required:
                        - code
                cancellation_fee:
                  oneOf:
                    - properties:
                        percentage:
                          type: string
                          pattern: '^(100(\.0{1,2})?|(\d{1,2})(\.\d{1,2})?)$'
                      required:
                        - percentage
                    - properties:
                        amount:
                          properties:
                            value:
                              type: string
                              pattern: '^[+-]?(\d+(\.\d*)?|\.\d+)$'
                          required:
                            - currency
                            - value
                      required:
                        - amount
              required:
                - fulfillment_state
                - cancellation_fee
        required:
          - cancellation_terms
