#structure it like u did for search SETTLEMENT_TERMS
# we can define 3 things on a set of tags
# 1. a list of tag values allowed under a taggroup.
# 2. type of value for each of those tags
# 3. the must have tags from the list (must be present in that taggroup)
properties:
  message:
    properties:
      order:
        properties:
          items:
            items:
              properties:
                tags:
                  items:
                    if:
                      properties:
                        descriptor:
                          properties:
                            code:
                              const: FARE_POLICY
                    then:
                      properties:
                        list:
                          type: array
                          items:
                            type: object
                            properties:
                              descriptor:
                                properties:
                                  code:
                                    type: string
                                    enum:
                                      - MIN_FARE
                                      - MIN_FARE_DISTANCE_KM
                                      - PER_KM_CHARGE
                                      - PICKUP_CHARGE
                                      - WAITING_CHARGE_PER_MIN
                                      - NIGHT_CHARGE_MULTIPLIER
                                      - NIGHT_SHIFT_START_TIME
                                      - NIGHT_SHIFT_END_TIME
                                      - EXTERNAL_REF