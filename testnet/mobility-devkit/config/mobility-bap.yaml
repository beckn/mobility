appName: "onix-bap"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transactionId
    - messageId
http:
  port: 8081
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
  becknConstants:
    disableRemoteRefresh: true

modules:
  # ─────────────────────────────────────────────────────────────────
  # BAP Receiver — accepts on_* callbacks from BPPs
  # Listens at:  http://localhost:8081/bap/receiver/
  # ─────────────────────────────────────────────────────────────────
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            # Testnet sandbox subscriber shared with beckn-onix's generic-devkit,
            # registered on beckn.one/testnet via the DeDi registry.
            # Replace with your own registered subscriber ID and keys for production.
            subscriberId: bap.example.com
            keyId: 76EU7LZ7gfqj13dWDKR1Uitnim11mCoxWBPdzLxUpAMBPVdANKgyFM
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        cache:
          id: cache
          config:
            addr: redis:6379
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/mobility-routing-BAPReceiver.yaml
        signer:
          id: signer
        payloadStore:
          id: payloadstore
          config:
            ttl: "24h"
            indexTTL: "25h"
            storeSignature: "true"
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transactionId,messageId
              role: bap
      steps:
        - validateSign
        - addRoute
        - validateSchema
        - signAck

  # ─────────────────────────────────────────────────────────────────
  # BAP Caller — forwards outbound BAP requests to BPPs / CDS
  # Listens at:  http://localhost:8081/bap/caller/
  # Postman bap_adapter_url = http://localhost:8081/bap/caller
  # ─────────────────────────────────────────────────────────────────
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            subscriberId: bap.example.com
            keyId: 76EU7LZ7gfqj13dWDKR1Uitnim11mCoxWBPdzLxUpAMBPVdANKgyFM
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        cache:
          id: cache
          config:
            addr: redis:6379
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        router:
          id: router
          config:
            routingConfig: ./config/mobility-routing-BAPCaller.yaml
        signer:
          id: signer
        signValidator:
          id: signvalidator
        payloadStore:
          id: payloadstore
          config:
            ttl: "24h"
            indexTTL: "25h"
            storeSignature: "true"
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transactionId,messageId
              role: bap
      steps:
        - addRoute
        - storePayload
        - validateSchema
        - sign
        - validateAckSign
